<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DietPlanner Pro - Smart Week</title>
    
    <!-- 設定 iPhone 主畫面 Icon -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/kerryraquel/DietPlanner-Pro/9e23209bb060a3b519946300ee5fda95a419564c/IMG_2979.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kerryraquel/DietPlanner-Pro/9e23209bb060a3b519946300ee5fda95a419564c/IMG_2979.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FAFAFA; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .animate-card {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-slide-in { 
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
    </style>
</head>
<body class="text-gray-800">

    <div id="app" class="min-h-screen pb-32 w-full overflow-x-hidden">
        <!-- 內容將由 JavaScript 動態渲染 -->
    </div>

    <script>
        // --- 1. 數據庫與分類邏輯 ---
        const RAW_RECIPES = [
            "0% Fat 希臘乳酪配白烚蛋", 
            "去皮黑椒雞扒配西蘭花", 
            "日式壽喜燒鍋 (紅蘿蔔/硬豆腐/金針菇/洋蔥/娃娃菜/肉片/魔芋絲)", 
            "Cobb Salad", "蝦仁魔芋絲青瓜雞蛋沙律", "辣三文魚波奇碗", "味噌椰香豬里肌蘑菇豆腐西蘭花烏冬", "Caesar Salad with Chicken Breast",
            "Shepherd / Cottage Pie", "洋蔥木耳炒雞蛋", "意式蔬菜意粉湯", "Toscana Salmon", "花椒青椒炒雞丁",
            "蘋果炖豬扒", "酸辣薯絲燘牛肉", "地中海蝦翠玉瓜彩椒", "法式菌菇炖雞", "輕量芝士牛肉蔬菜鍋",
            "黑松露蘑菇蝦", "白蘑菇炒雞髀肉", "娃娃菜番茄粉絲燜牛肉", "番茄牛肉豆腐煲", "粉絲節瓜蝦米",
            "蘆筍烤三文魚薯仔", "葡式蝦仁水牛芝士雞蛋沙律", "長邊豆南瓜雞肉", "青瓜牛油果豆芽山羊芝士三文治", "牛油果雞肉希臘乳酪全麥burrito",
            "牛油果芒果蝦仁聖女果沙律", "貝貝南瓜蝦雞胸蘆筍紅蘿蔔薯仔空氣炸鍋", "烤薯仔蝦仁蘆筍白蘑菇", "烤椰菜BB紅薯雞蛋沙律", "西蘭花牛肉炒烏冬",
            "粟米雞胸沙律", "烤椰菜配Romesco Sauce", "creamy garlic 西蘭花三文魚poke", "蒜烤雞肉紅蘿蔔翠玉瓜薯仔西蘭花", "烤雞髀粟米配希臘沙律",
            "烤魚烚蛋蘆筍西蘭花薯仔", "Silken Tofu Pasta with Broccoli", "翠玉瓜+煙三文魚/煎蛋/蝦仁/雞胸+牛油果/生菜/甜椒+少量芝士碎卷餅", "娃娃菜雞蛋豆腐湯", "娃娃菜番茄粉絲炆牛肉",
            "辣味鮮蝦雜蔬", "蕃茄薯仔牛肉湯", "蘿蔔煎蛋湯", "蕃茄金針菇豆腐湯", "菠菜雞蛋湯",
            "紫菜牛肉湯", "蕃茄炒蛋+清炒蔬菜", "蒜香蘑菇炆蝦仁/煎雞", "酸奶薯仔雞蛋沙律", "翠玉瓜炒牛肉+炒豆芽",
            "蔬菜牛肉鍋", "Tunacado Sandwich", "地中海檸檬烤雞沙律", "Creamy Chicken Corn Salad", "地中海風味蝦仁碗",
            "紅蘿蔔炒牛肉+炒椰菜", "彩椒百蘑菇炒生菜雞肉", "青椒炒牛肉+炒法邊豆", "牛油果雞肉沙律", "牛肉粒牛油果蕃茄洋蔥wrap",
            "蒸水蛋 + 半拳粗糧 + 半拳蛋白質+ 炒蔬菜", "椰菜紅蘿蔔絲炒雞蛋", "Shrimp Avocado Lettuce Boats", "蝦仁芋絲西蘭花炒蛋", "Cucumber and Avocado Sandwich",
            "Italian Frittata", "清蒸鱸魚+炒蔬菜", "日式鯖魚定食", "滑蛋蝦仁蓋飯", "檸檬手撕雞千張或蒟蒻麵配烤蔬菜",
            "韓式泡菜豆腐蔬菜鍋", "墨西哥雞肉碗", "香煎雞腿蔬菜扁豆", "越式鮮蝦雜錦蔬菜春卷", "藤椒牛肉粒炒時蔬",
            "清炖白蘿蔔牛肉湯", "洋蔥豬肉蔬菜湯鍋", "雞髀那不勒斯意粉烤蔬菜", "檸檬花椒焗牛肉配洋蔥彩椒蕃茄仔", "青椒雞蛋炒豆腐",
            "奧爾良雞胸丁洋蔥炒彩椒", "奧爾良雞胸條", "生菜蕃茄仔沙律", "洋蔥彩椒炒豬肝", "煙三文魚滑蛋車厘茄全麥多士",
            "蒜香牛柳粒蘆筍配薯仔", "蝦仁椰菜絲炒粉絲煲", "微波爐版蒜蓉蝦仁粉絲煲", "微波爐板韓式泡菜雞肉鍋蛋煲", "微波爐版梅花肉酸湯小火鍋",
            "微波爐版咖喱洋蔥紅蘿蔔椰菜花魚丸烏冬", "微波爐版蕃茄巴沙魚魔芋絲豆腐鍋", "微波爐版照燒雞腿肉蔬菜煲", "Overnight rolled oats + milk + small amount of fruit and chia seeds", "清蒸豆腐娃娃菜肉餅",
            "法式巴斯克炖雞配西蘭花拌蒟蒻米飯", "水浸吞拿魚雞蛋青瓜螺絲粉沙律配希臘沙律", "雙椒牛肉千張麵", "Cajun香料雞髀飯", "Chilli Con Carne",
            "蘋果肉桂烤燕麥", "蝦仁牛肉拌麵", "檸檬乾煎雞", "椰菜絲燘肉絲", "薯絲娃娃菜牛肉片蒸蛋",
            "法式橙香紙包魚", "翠玉瓜絲蝦仁餅"
        ];

        const getRecipeEmoji = (name, category) => {
            const n = name.toLowerCase();
            if (n.includes('乳酪') || n.includes('yogurt')) return '🥣';
            if (n.includes('壽喜燒') || n.includes('sukiyaki')) return '🍲';
            if (n.includes('oats') || n.includes('燕麥')) return '🥣';
            if (n.includes('sandwich') || n.includes('三文治') || n.includes('toast') || n.includes('多士')) return '🥪';
            if (n.includes('wrap') || n.includes('burrito') || n.includes('卷餅')) return '🌯';
            if (n.includes('salad') || n.includes('沙律') || n.includes('bowl')) return '🥗';
            if (n.includes('pasta') || n.includes('意粉') || n.includes('螺絲粉')) return '🍝';
            if (n.includes('noodle') || n.includes('麵') || n.includes('烏冬') || n.includes('udon')) return '🍜';
            if (n.includes('soup') || n.includes('湯') || n.includes('鍋')) return '🥘';
            if (n.includes('蝦') || n.includes('shrimp')) return '🦐';
            if (n.includes('魚') || n.includes('fish') || n.includes('salmon') || n.includes('tuna') || n.includes('鯰')) return '🐟';
            if (n.includes('雞') || n.includes('chicken')) return '🐔';
            if (n.includes('牛') || n.includes('beef') || n.includes('steak')) return '🥩';
            if (n.includes('豬') || n.includes('pork')) return '🐷';
            if (n.includes('蛋') || n.includes('egg')) return '🍳';
            if (n.includes('豆腐') || n.includes('tofu')) return '🧊';
            return '🍽️';
        };

        const analyzeRecipe = (name) => {
            const n = name.toLowerCase();
            let category = 'other';
            let macros = { p: 0, c: 0, f: 0, cal: 0 };

            // 1. 分類
            if (n.includes('oats') || n.includes('燕麥') || n.includes('toast') || n.includes('sandwich') || n.includes('frittata') || n.includes('breakfast') || n.includes('多士') || n.includes('三文治') || n.includes('乳酪')) {
                category = 'breakfast';
            } else if (n.includes('雞') || n.includes('chicken') || n.includes('poulet')) {
                category = 'chicken';
            } else if (n.includes('牛') || n.includes('beef') || n.includes('steak') || n.includes('carne')) {
                category = 'beef';
            } else if (n.includes('蝦') || n.includes('魚') || n.includes('salmon') || n.includes('fish') || n.includes('shrimp') || n.includes('seafood') || n.includes('tuna') || n.includes('鯰')) {
                category = 'seafood';
            } else if (n.includes('豬') || n.includes('pork') || n.includes('肉絲') || n.includes('肉餅')) {
                category = 'pork';
            } else {
                category = 'vegetarian';
            }

            // 2. 營養素估算 (基礎值)
            if (category === 'breakfast') {
                macros = { p: 20, c: 35, f: 10 }; 
            } else if (category === 'chicken') {
                macros = { p: 35, c: 35, f: 12 }; 
            } else if (category === 'beef') {
                macros = { p: 32, c: 30, f: 16 }; 
            } else if (category === 'seafood') {
                macros = { p: 34, c: 35, f: 12 }; 
            } else if (category === 'pork') {
                macros = { p: 30, c: 30, f: 18 }; 
            } else { 
                macros = { p: 20, c: 40, f: 14 }; 
            }

            // 3. 針對特定菜式的精確修正 (基於用戶 MFP 數據調整)
            
            // 修正：壽喜燒 (考慮肉類+豆腐的雙重蛋白質，以及湯底/蔬菜的熱量)
            // MFP紀錄顯示約 550kcal。為了不讓總熱量爆表，我們設定為約 420kcal 的飽足份量。
            if (n.includes('壽喜燒')) { 
                macros.p = 45; // 肉 + 豆腐
                macros.c = 25; // 大量蔬菜 + 壽喜燒汁糖分
                macros.f = 16; // 肉脂 + 豆腐脂 + 湯底
            } 
            
            // 修正：希臘乳酪 (考慮市售乳酪非純蛋白，且含蛋)
            // MFP紀錄約 194kcal。
            else if (n.includes('乳酪') || n.includes('yogurt')) {
                macros.p = 18; // 1隻蛋(6g) + 100g乳酪(約8-10g)
                macros.c = 12; // 乳酪自帶糖分
                macros.f = 10; // 蛋黃(5g) + 乳酪脂肪
            }

            // 修正：黑椒雞扒 (考慮較大的主菜份量)
            else if (n.includes('黑椒雞扒')) {
                macros.p = 40; // 200g 生雞扒
                macros.c = 15; // 西蘭花 + 少量醃料
                macros.f = 12; // 烹飪油 + 雞肉脂肪
            }

            // 其他微調
            else if (n.includes('飯') || n.includes('麵') || n.includes('意粉') || n.includes('pasta') || n.includes('udon') || n.includes('薯') || n.includes('南瓜')) {
                macros.c += 10;
            } else if (n.includes('沙律') || n.includes('salad') || n.includes('湯') || n.includes('soup') || n.includes('蒟蒻') || n.includes('千張')) {
                macros.c -= 10;
            }

            macros.cal = (macros.p * 4) + (macros.c * 4) + (macros.f * 9);
            return { category, macros };
        };

        const RECIPES = RAW_RECIPES.map((name, index) => {
            const analysis = analyzeRecipe(name);
            return {
                id: index,
                name,
                type: analysis.category === 'breakfast' ? 'breakfast' : 'lunch_dinner',
                category: analysis.category,
                macros: analysis.macros,
                emoji: getRecipeEmoji(name, analysis.category)
            };
        });

        // 生成配料邏輯
        const generateIngredients = (name, level, type) => {
            let ings = [];
            const n = name.toLowerCase();
            const isFasting = level === 'Fasting';
            const isDinner = type === 'dinner';
            
            // --- 特殊菜式邏輯 ---
            // 1. 壽喜燒 (份量調升以匹配熱量)
            if (n.includes('壽喜燒')) {
                ings.push({ text: '湯底：壽喜燒汁 (注意糖分) 或 昆布醬油', highlight: false });
                ings.push({ text: `蛋白質組合：肉片 (120g) + 硬豆腐 (100g)`, highlight: true }); // 明確標示雙重蛋白
                ings.push({ text: '大量配料：紅蘿蔔、金針菇、洋蔥、娃娃菜', highlight: false });
                ings.push({ text: '主食：魔芋絲 (取代白飯)', highlight: true });
                return ings;
            }

            // 2. 希臘乳酪
            if (n.includes('乳酪') || n.includes('yogurt')) {
                ings.push({ text: '希臘乳酪/希臘式乳酪 (100g-150g)', highlight: false });
                ings.push({ text: '白烚蛋 (1隻)', highlight: false });
                if (!isFasting) ings.push({ text: '搭配：少量藍莓或奇亞籽', highlight: false });
                return ings;
            }

            // 3. 黑椒雞扒
            if (n.includes('黑椒雞扒')) {
                ings.push({ text: `去皮雞扒 (生重 ${isFasting ? '150g' : '200g'})`, highlight: false }); // 調高份量
                ings.push({ text: '醃料：黑胡椒、少許鹽、蒜粉', highlight: false });
                ings.push({ text: '配菜：西蘭花 (200g)', highlight: false });
            }

            // --- 通用邏輯 ---
            if (n.includes('oats') || n.includes('燕麥')) {
                if (isFasting) return [{ text: '燕麥 (30g)', highlight: false }, { text: '水/無糖杏仁奶 (200ml)', highlight: false }, { text: '奇亞籽 (5g)', highlight: false }];
                return [{ text: '燕麥 (40g)', highlight: false }, { text: '低脂牛奶/豆漿 (200ml)', highlight: false }, { text: '水果 (半個拳頭)', highlight: false }];
            }

            let meatWeight = '150g'; // 默認份量調高至 150g 以更接近實際飲食
            if (isFasting) meatWeight = '120g'; 
            
            if (ings.length === 0) { 
                if (n.includes('雞')) ings.push({ text: `雞胸/雞柳 (生重 ${meatWeight})`, highlight: false });
                else if (n.includes('牛')) ings.push({ text: `瘦牛肉 (生重 ${isFasting ? '110g' : '130g'})`, highlight: false });
                else if (n.includes('蝦')) ings.push({ text: `蝦仁 (${isFasting ? '12隻' : '15-18隻'})`, highlight: false });
                else if (n.includes('魚') || n.includes('salmon') || n.includes('tuna')) ings.push({ text: `魚柳 (生重 ${isFasting ? '130g' : '150g'})`, highlight: false });
                else if (n.includes('蛋')) ings.push({ text: `雞蛋 (${isFasting ? '1隻+2蛋白' : '2隻'})`, highlight: false });
                else ings.push({ text: `優質蛋白質 (生重 ${meatWeight})`, highlight: false });

                ings.push({ text: '時令蔬菜 (250g+)', highlight: false });
            }

            if (type === 'breakfast') {
                if (!n.includes('乳酪')) {
                    if (isFasting) ings.push({ text: '全麥麵包 (1片) 或 略過澱粉', highlight: true });
                    else ings.push({ text: '全麥麵包 (1-2片) / 燕麥 (40g)', highlight: false });
                }
            } else {
                if (n.includes('壽喜燒')) {
                } else if (isFasting) {
                    ings.push({ text: '🚫 輕斷食日：不吃主食，多吃蔬菜', highlight: true });
                } else if (isDinner) {
                    if (level === 'High') ings.push({ text: '白飯 (100g) / 薯仔 (1個)', highlight: false });
                    else ings.push({ text: '🔸 晚餐建議：只吃蔬菜+蛋白質 (無澱粉)', highlight: true });
                } else {
                    if (level === 'Low') ings.push({ text: '飯 (100g) / 蕃薯 (120g) / 蒟蒻麵', highlight: true });
                    else if (level === 'Medium') ings.push({ text: '飯 (130g) / 意粉 (熟重 130g)', highlight: false });
                    else ings.push({ text: '飯 (150g) / 薯仔 (中型2個)', highlight: false });
                }
            }
            return ings;
        };

        // --- 2. 狀態管理 ---
        const USER_TARGETS = { p: 94, c: 125, f: 42 };
        const TARGET_CALORIES = 1250;
        const FASTING_TARGETS = { p: 70, c: 50, f: 30, cal: 850 };

        const state = {
            currentDayIndex: new Date().getDay(),
            menuOpen: false,
            selectorOpen: false, 
            selectorTarget: { dayIndex: null, mealType: null }, 
            weeklyData: []
        };

        function initData() {
            const breakfastOpts = RECIPES.filter(r => r.type === 'breakfast');
            const mainOpts = RECIPES.filter(r => r.type === 'lunch_dinner');
            const pick = (arr) => arr.length > 0 ? arr[Math.floor(Math.random() * arr.length)] : RECIPES[0];
            
            const patternMap = { 
                1: 'Fasting', 4: 'Fasting', 
                2: 'Low', 3: 'Medium', 5: 'Low', 6: 'High', 0: 'Medium' 
            };

            for(let i=0; i<7; i++) {
                state.weeklyData.push({
                    dayIndex: i,
                    level: patternMap[i],
                    plan: { 
                        breakfast: pick(breakfastOpts), 
                        lunch: pick(mainOpts), 
                        dinner: pick(mainOpts) 
                    },
                    skipped: { breakfast: false, lunch: false, dinner: false },
                    swapped: { breakfast: false, lunch: false, dinner: false },
                    water: i === new Date().getDay() ? 3 : 0,
                    brazilNut: true
                });
            }
        }

        // --- 3. 操作函數 ---
        window.setDay = (index) => { state.currentDayIndex = index; render(); };
        window.toggleMenu = () => { state.menuOpen = !state.menuOpen; render(); };
        
        window.openRecipeSelector = (mealType) => {
            state.selectorTarget = { dayIndex: state.currentDayIndex, mealType: mealType };
            state.selectorOpen = true;
            render();
        };

        window.closeRecipeSelector = () => {
            state.selectorOpen = false;
            render();
        };

        window.selectRecipe = (recipeId) => {
            const { dayIndex, mealType } = state.selectorTarget;
            const recipe = RECIPES.find(r => r.id === recipeId);
            
            if (recipe) {
                state.weeklyData[dayIndex].plan[mealType] = recipe;
                state.weeklyData[dayIndex].swapped[mealType] = true;
                state.weeklyData[dayIndex].skipped[mealType] = false;
            }
            state.selectorOpen = false;
            render();
        };

        window.toggleMode = () => {
            const levels = ['Low', 'Medium', 'High', 'Fasting'];
            const day = state.weeklyData[state.currentDayIndex];
            const currentIdx = levels.indexOf(day.level);
            day.level = levels[(currentIdx + 1) % 4];
            render();
        };
        
        window.toggleBrazilNut = () => {
            const day = state.weeklyData[state.currentDayIndex];
            day.brazilNut = !day.brazilNut;
            render();
        };
        window.updateWater = (delta) => {
            const day = state.weeklyData[state.currentDayIndex];
            let newAmount = day.water + delta;
            if (newAmount < 0) newAmount = 0;
            if (newAmount > 8) newAmount = 8;
            day.water = newAmount;
            render();
        };
        window.toggleSkip = (mealType) => {
            const day = state.weeklyData[state.currentDayIndex];
            day.skipped[mealType] = !day.skipped[mealType];
            render();
        };
        window.swapMeal = (mealType) => {
            const day = state.weeklyData[state.currentDayIndex];
            const currentMeal = day.plan[mealType];
            
            const pool = mealType === 'breakfast' 
                ? RECIPES.filter(r => r.type === 'breakfast') 
                : RECIPES.filter(r => r.type === 'lunch_dinner');
            
            let newMeal = pool[Math.floor(Math.random() * pool.length)];
            let attempts = 0;
            while (newMeal.id === currentMeal.id && attempts < 10) {
                newMeal = pool[Math.floor(Math.random() * pool.length)];
                attempts++;
            }

            day.plan[mealType] = newMeal;
            day.swapped[mealType] = true;
            day.skipped[mealType] = false;
            render();
        };

        // --- 4. 渲染函數 ---
        function render() {
            const app = document.getElementById('app');
            const dayData = state.weeklyData[state.currentDayIndex];
            const isFasting = dayData.level === 'Fasting';
            
            const currentTarget = isFasting ? FASTING_TARGETS : USER_TARGETS;
            const currentTargetCal = isFasting ? FASTING_TARGETS.cal : TARGET_CALORIES;

            let currentCal = 0, currentP = 0, currentC = 0, currentF = 0;
            if (dayData.brazilNut) { currentCal += 33; currentP += 1; currentC += 0.5; currentF += 3.5; }

            ['breakfast', 'lunch', 'dinner'].forEach(type => {
                if (!dayData.skipped[type]) {
                    const meal = dayData.plan[type];
                    let mealC = meal.macros.c;
                    let mealP = meal.macros.p;
                    let mealF = meal.macros.f;

                    if (isFasting) {
                        mealC = mealC * 0.3; 
                        mealP = mealP * 0.8; 
                        mealF = mealF * 0.7; 
                    } else if (dayData.level === 'Low') {
                        if (type !== 'breakfast') mealC = mealC * 0.5; 
                    } else if (type === 'dinner' && dayData.level !== 'High') {
                        mealC = mealC * 0.2; 
                    }

                    currentP += mealP;
                    currentC += mealC;
                    currentF += mealF;
                    currentCal += (mealP * 4) + (mealC * 4) + (mealF * 9);
                }
            });

            const getLevelStyle = (level) => {
                if (level === 'Low') return { bg: 'bg-emerald-100', text: 'text-emerald-700', bar: 'bg-emerald-500', icon: 'leaf' };
                if (level === 'Medium') return { bg: 'bg-blue-100', text: 'text-blue-700', bar: 'bg-blue-500', icon: 'battery' };
                if (level === 'High') return { bg: 'bg-orange-100', text: 'text-orange-700', bar: 'bg-orange-500', icon: 'flame' };
                if (level === 'Fasting') return { bg: 'bg-purple-100', text: 'text-purple-700', bar: 'bg-purple-500', icon: 'sparkles' };
                return { bg: 'bg-gray-100', text: 'text-gray-700', bar: 'bg-gray-500', icon: 'circle' };
            };
            const levelStyle = getLevelStyle(dayData.level);
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            // 計算顯示順序：從今天開始
            const realTodayIndex = new Date().getDay(); 
            const orderedIndices = Array.from({length: 7}, (_, i) => (realTodayIndex + i) % 7);

            let html = '';

            // Header
            html += `
                <div class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-gray-200 pt-3 pb-2 px-3 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <h1 class="text-base font-bold text-gray-900 tracking-tight">DietPlanner <span class="text-orange-500">Pro</span></h1>
                        <button onclick="toggleMenu()" class="p-2 rounded-full hover:bg-gray-100 text-gray-600 transition-colors"><i data-lucide="menu" class="w-5 h-5"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1.5">
                        ${orderedIndices.map(i => {
                            const d = state.weeklyData[i];
                            const isSelected = i === state.currentDayIndex;
                            const dStyle = getLevelStyle(d.level);
                            return `<button onclick="setDay(${i})" class="relative h-14 rounded-xl border transition-all duration-300 ${isSelected ? 'border-gray-800 bg-white shadow-lg scale-105 ring-1 ring-gray-800 z-10' : 'border-gray-100 bg-white opacity-70 hover:opacity-100'}">
                                <div class="absolute top-0 right-0 w-3 h-3 rounded-bl-xl ${dStyle.bg}"></div>
                                <div class="h-full flex flex-col justify-center items-center">
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">${days[i]}</span>
                                    <span class="text-sm font-extrabold ${isSelected ? 'text-gray-900' : 'text-gray-500'}">${d.level[0]}</span>
                                </div>
                            </button>`;
                        }).join('')}
                    </div>
                </div>
            `;

            // Dashboard
            html += `
                <div class="px-4 mt-4">
                    <div class="bg-white rounded-2xl p-4 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100">
                        <div class="flex justify-between items-center mb-3">
                            <span class="flex items-center space-x-1.5 px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider ${levelStyle.bg} ${levelStyle.text}">
                                <i data-lucide="${levelStyle.icon}" class="w-3 h-3"></i><span>${dayData.level === 'Fasting' ? 'Fasting Day' : dayData.level + ' Carb'}</span>
                            </span>
                            <div class="flex items-center space-x-2">
                                <button onclick="toggleBrazilNut()" class="px-2 py-1 rounded-full border text-[10px] font-bold transition-all ${dayData.brazilNut ? 'bg-amber-100 text-amber-800 border-amber-200 shadow-sm' : 'bg-gray-50 text-gray-400 border-gray-100'}">🌰 巴西堅果</button>
                                <button onclick="toggleMode()" class="w-8 h-5 rounded-full relative transition-colors ${dayData.level === 'Low' ? 'bg-emerald-500' : dayData.level === 'Medium' ? 'bg-blue-500' : dayData.level === 'High' ? 'bg-orange-500' : 'bg-purple-500'}">
                                    <div class="absolute top-0.5 left-0.5 bg-white w-4 h-4 rounded-full shadow-md transition-transform duration-300 ${dayData.level === 'Low' ? 'translate-x-0' : dayData.level === 'Medium' ? 'translate-x-1' : dayData.level === 'High' ? 'translate-x-2' : 'translate-x-3.5'}"></div>
                                </button>
                            </div>
                        </div>
                        <div class="flex items-baseline mb-4">
                            <span class="text-3xl font-extrabold text-gray-900 mr-1.5">${Math.round(currentCal)}</span>
                            <span class="text-sm text-gray-400 font-medium">/ ${currentTargetCal} kcal</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                <div class="flex justify-between text-[10px] mb-1.5"><span class="font-bold text-gray-500">Prot</span><span class="text-gray-900 font-bold">${Math.round(currentP)}g</span></div>
                                <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden"><div class="h-full bg-slate-800 rounded-full transition-all duration-500" style="width: ${Math.min((currentP/currentTarget.p)*100, 100)}%"></div></div>
                                <div class="text-[9px] text-gray-400 text-right mt-1">Goal: ${currentTarget.p}g</div>
                            </div>
                            <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                <div class="flex justify-between text-[10px] mb-1.5"><span class="font-bold text-gray-500">Carb</span><span class="text-gray-900 font-bold">${Math.round(currentC)}g</span></div>
                                <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden"><div class="h-full rounded-full transition-all duration-500 ${levelStyle.bar}" style="width: ${Math.min((currentC/currentTarget.c)*100, 100)}%"></div></div>
                                <div class="text-[9px] text-gray-400 text-right mt-1">Goal: ${currentTarget.c}g</div>
                            </div>
                            <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                                <div class="flex justify-between text-[10px] mb-1.5"><span class="font-bold text-gray-500">Fat</span><span class="text-gray-900 font-bold">${Math.round(currentF)}g</span></div>
                                <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden"><div class="h-full bg-yellow-500 rounded-full transition-all duration-500" style="width: ${Math.min((currentF/currentTarget.f)*100, 100)}%"></div></div>
                                <div class="text-[9px] text-gray-400 text-right mt-1">Goal: ${currentTarget.f}g</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Water Tracker
            html += `<div class="px-4 mt-4">`;
            if (dayData.water >= 8) {
                html += `
                    <div class="bg-gradient-to-r from-yellow-50 to-amber-50 border border-yellow-100 rounded-2xl p-3 shadow-sm relative overflow-hidden flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-xl bg-yellow-100 flex items-center justify-center shadow-inner"><i data-lucide="droplet" class="w-5 h-5 text-yellow-600 fill-yellow-600"></i></div>
                            <div><h3 class="text-sm font-bold text-slate-900">Hydration Goal!</h3><p class="text-[10px] text-yellow-700 font-medium">8/8 Cups Reached 🎉</p></div>
                        </div>
                        <div class="flex space-x-1.5">
                            <button onclick="updateWater(-1)" class="w-8 h-8 rounded-full border border-yellow-200 bg-white flex items-center justify-center text-gray-400 hover:bg-gray-50"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                            <button onclick="updateWater(1)" class="w-8 h-8 rounded-full bg-yellow-400 text-white flex items-center justify-center shadow-sm shadow-yellow-200"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="bg-white rounded-2xl p-2 pr-2 shadow-sm border border-gray-100 flex items-center justify-between h-14">
                        <div class="flex items-center h-full pl-2 flex-1">
                            <div class="flex items-center space-x-1.5 mr-2">
                                <i data-lucide="droplet" class="w-4 h-4 text-blue-500 fill-blue-500 mr-1"></i>
                                ${Array(8).fill(0).map((_, i) => `<div class="w-1.5 h-3 rounded-full flex-shrink-0 transition-all duration-300 ${i < dayData.water ? 'bg-blue-500 h-4' : 'bg-blue-100'}"></div>`).join('')}
                            </div>
                        </div>
                        <div class="flex items-center space-x-3 pr-1">
                            <span class="text-gray-500 font-bold text-xs whitespace-nowrap">${dayData.water * 250}ml</span>
                            <div class="flex space-x-1.5">
                                <button onclick="updateWater(-1)" class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-gray-50"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <button onclick="updateWater(1)" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-md shadow-blue-200 active:scale-95 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }
            html += `</div>`;

            // Meals
            html += `<div class="px-4 mt-5 space-y-5 pb-10">`;
            ['breakfast', 'lunch', 'dinner'].forEach((type, index) => {
                const meal = dayData.plan[type];
                const skipped = dayData.skipped[type];
                const swapped = dayData.swapped[type];
                const ingredients = generateIngredients(meal.name, dayData.level, type);
                
                let mealC = meal.macros.c;
                let mealP = meal.macros.p;
                let mealF = meal.macros.f;

                if (isFasting) {
                    mealC = mealC * 0.3; 
                    mealP = mealP * 0.8;
                    mealF = mealF * 0.7;
                } else if (dayData.level === 'Low' && type !== 'breakfast') {
                    mealC = mealC * 0.5;
                } else if (type === 'dinner' && dayData.level !== 'High') {
                    mealC = mealC * 0.2;
                }

                const displayCal = Math.round((mealP * 4) + (mealC * 4) + (mealF * 9));
                const calPercent = Math.min((displayCal / currentTargetCal) * 100 * 3, 100); 
                const labels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
                const delay = index * 100;

                html += `
                    <div class="animate-card" style="animation-delay: ${delay}ms">
                        <div class="bg-white border-0 rounded-2xl p-5 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] ring-1 ring-gray-100 transition-all duration-300 hover:shadow-xl relative overflow-hidden ${skipped ? 'opacity-60 grayscale' : ''}">
                            ${swapped ? '<div class="absolute top-0 right-0 bg-blue-500 text-white text-[9px] font-bold px-2 py-1 rounded-bl-xl shadow-sm">已更新</div>' : ''}
                            
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex items-start space-x-3">
                                    <div class="w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center text-2xl shadow-inner border border-gray-100 flex-shrink-0">
                                        ${meal.emoji}
                                    </div>
                                    <div class="flex-1 min-w-0 pr-2">
                                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">${labels[type]}</div>
                                        <h3 class="text-base font-bold text-gray-900 leading-tight truncate ${skipped ? 'line-through decoration-gray-400' : ''}">${meal.name}</h3>
                                        
                                        ${!skipped ? `
                                        <div class="mt-2 flex items-center space-x-2">
                                            <div class="text-xs font-bold text-gray-700">${displayCal} <span class="text-[10px] font-normal text-gray-400">kcal</span></div>
                                            <div class="w-16 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                                <div class="h-full bg-orange-400 rounded-full" style="width: ${calPercent}%"></div>
                                            </div>
                                        </div>
                                        ` : ''}
                                    </div>
                                </div>
                                <div class="flex flex-col space-y-1">
                                    <button onclick="openRecipeSelector('${type}')" class="w-8 h-8 rounded-full bg-gray-50 text-gray-400 hover:text-purple-600 hover:bg-purple-50 flex items-center justify-center transition-colors"><i data-lucide="list" class="w-4 h-4"></i></button>
                                    <button onclick="swapMeal('${type}')" class="w-8 h-8 rounded-full bg-gray-50 text-gray-400 hover:text-blue-600 hover:bg-blue-50 flex items-center justify-center transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                                    <button onclick="toggleSkip('${type}')" class="w-8 h-8 rounded-full bg-gray-50 text-gray-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition-colors"><i data-lucide="${skipped ? 'rotate-ccw' : 'x'}" class="w-4 h-4"></i></button>
                                </div>
                            </div>

                            ${!skipped ? `
                                <div class="flex space-x-2 mb-4">
                                    <span class="px-2 py-1 rounded-md bg-slate-50 text-slate-600 text-[10px] font-bold border border-slate-100">P: ${Math.round(mealP)}g</span>
                                    <span class="px-2 py-1 rounded-md bg-emerald-50 text-emerald-600 text-[10px] font-bold border border-emerald-100">C: ${Math.round(mealC)}g</span>
                                    <span class="px-2 py-1 rounded-md bg-amber-50 text-amber-600 text-[10px] font-bold border border-amber-100">F: ${Math.round(mealF)}g</span>
                                </div>

                                <div class="space-y-2 mb-2 bg-gray-50/50 p-3 rounded-xl border border-gray-100/50">
                                    ${ingredients.map(ing => `
                                        <div class="flex items-start space-x-2.5">
                                            <div class="mt-1 text-emerald-500 flex-shrink-0"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i></div>
                                            <span class="text-xs leading-relaxed ${ing.highlight ? 'text-rose-500 font-bold' : 'text-gray-600'}">${ing.text}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            html += `</div>`;

            // Menu Drawer (Read Only)
            if (state.menuOpen) {
                const categoriesOrder = [
                    { key: 'breakfast', label: '早餐 / 輕食' },
                    { key: 'chicken', label: '雞肉料理' },
                    { key: 'beef', label: '牛肉料理' },
                    { key: 'seafood', label: '海鮮 / 魚類' },
                    { key: 'pork', label: '豬肉料理' },
                    { key: 'vegetarian', label: '素食 / 其他' }
                ];
                
                html += `
                    <div class="fixed inset-0 z-50 flex justify-end">
                        <div class="absolute inset-0 bg-gray-900/20 backdrop-blur-sm transition-opacity" onclick="toggleMenu()"></div>
                        <div class="relative w-4/5 max-w-sm bg-white h-full shadow-2xl flex flex-col animate-slide-in">
                            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/80 backdrop-blur-md">
                                <h2 class="text-lg font-bold text-gray-900">菜單資料庫</h2>
                                <button onclick="toggleMenu()" class="p-2 rounded-full hover:bg-gray-200 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <div class="flex-1 overflow-y-auto p-5 hide-scrollbar">
                                <div class="space-y-8">
                                    ${categoriesOrder.map(cat => {
                                        const catRecipes = RECIPES.filter(r => r.category === cat.key);
                                        if (catRecipes.length === 0) return '';
                                        return `
                                            <div>
                                                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center">
                                                    <span class="w-1.5 h-1.5 rounded-full bg-orange-400 mr-2"></span>${cat.label}
                                                </h3>
                                                <div class="space-y-2.5">
                                                    ${catRecipes.map(r => `
                                                        <div class="text-xs text-gray-700 p-3 bg-white rounded-xl border border-gray-100 shadow-sm flex justify-between items-center">
                                                            <div class="flex items-center space-x-2">
                                                                <span class="text-lg">${r.emoji}</span>
                                                                <span class="font-medium">${r.name}</span>
                                                            </div>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Recipe Selector Drawer (Interactive)
            if (state.selectorOpen) {
                const isBreakfast = state.selectorTarget.mealType === 'breakfast';
                
                const categoriesOrder = isBreakfast 
                    ? [{ key: 'breakfast', label: '早餐 / 輕食' }]
                    : [
                        { key: 'chicken', label: '雞肉料理' },
                        { key: 'beef', label: '牛肉料理' },
                        { key: 'seafood', label: '海鮮 / 魚類' },
                        { key: 'pork', label: '豬肉料理' },
                        { key: 'vegetarian', label: '素食 / 其他' }
                    ];

                html += `
                    <div class="fixed inset-0 z-[60] flex justify-end">
                        <div class="absolute inset-0 bg-gray-900/30 backdrop-blur-sm transition-opacity" onclick="closeRecipeSelector()"></div>
                        <div class="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-slide-in ml-auto">
                            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-white z-10">
                                <div>
                                    <h2 class="text-lg font-bold text-gray-900">選擇${isBreakfast ? '早餐' : '主餐'}</h2>
                                    <p class="text-xs text-gray-500">點擊以更換餐點</p>
                                </div>
                                <button onclick="closeRecipeSelector()" class="p-2 rounded-full hover:bg-gray-100 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <div class="flex-1 overflow-y-auto p-4 hide-scrollbar bg-gray-50">
                                <div class="space-y-6">
                                    ${categoriesOrder.map(cat => {
                                        const catRecipes = RECIPES.filter(r => r.category === cat.key);
                                        if (catRecipes.length === 0) return '';
                                        return `
                                            <div>
                                                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">${cat.label}</h3>
                                                <div class="grid grid-cols-1 gap-2">
                                                    ${catRecipes.map(r => `
                                                        <button onclick="selectRecipe(${r.id})" class="text-left w-full p-3 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-500 hover:ring-1 hover:ring-blue-500 transition-all flex items-center space-x-3 group">
                                                            <span class="text-2xl bg-gray-50 w-10 h-10 flex items-center justify-center rounded-lg group-hover:bg-blue-50">${r.emoji}</span>
                                                            <span class="text-sm font-medium text-gray-700 group-hover:text-blue-700 leading-tight">${r.name}</span>
                                                        </button>
                                                    `).join('')}
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            app.innerHTML = html;
            lucide.createIcons();
        }

        initData();
        render();

    </script>
</body>
</html>
