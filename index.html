const DEFAULT_PLAN = {

  Wednesday: { breakfast: 'b1', lunch: 'l3', dinner: 'd3' },

  Friday:    { breakfast: 'b5', lunch: 'l5', dinner: 'd5' },
  Saturday:  { brunch: 'br1',  dinner: 'd6' },
  Sunday:    { brunch: 'br2',  dinner: 'd7' },
};

const WEEKDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const WEEKEND  = ['Saturday','Sunday'];
const ALL_DAYS = [...WEEKDAYS, ...WEEKEND];

// ============================================================
// STATE
// ============================================================
let state = {
  activeTab: 'plan',
  activeDay: 'Monday',
  plan: JSON.parse(JSON.stringify(DEFAULT_PLAN)),
  hydration: 0,
  hydrationGoal: 2250,
  weightLog: JSON.parse(localStorage.getItem('dp_weight') || '{}'),
  weightInput: '',
  groceryGenerated: false,
};

// ============================================================
// HELPERS
// ============================================================
function getRecipe(id) {
  for (const cat of Object.values(RECIPES)) {
    const r = cat.find(r => r.id === id);
    if (r) return r;
  }
  return null;
}

function getDayMeals(day) {
  const plan = state.plan[day];
  const meals = [];
  if (plan.breakfast) meals.push({ slot: 'Breakfast', category: 'breakfast', recipe: getRecipe(plan.breakfast) });
  if (plan.brunch)    meals.push({ slot: 'Brunch',    category: 'brunch',    recipe: getRecipe(plan.brunch) });
  if (plan.lunch)     meals.push({ slot: 'Lunch',     category: 'lunch',     recipe: getRecipe(plan.lunch) });
  if (plan.dinner)    meals.push({ slot: 'Dinner',    category: 'dinner',    recipe: getRecipe(plan.dinner) });
  return meals;
}

function getDayTotals(day) {
  return getDayMeals(day).reduce((acc, m) => {
    acc.kcal    += m.recipe?.kcal    || 0;
    acc.protein += m.recipe?.protein || 0;
    acc.carbs   += m.recipe?.carbs   || 0;
    acc.fat     += m.recipe?.fat     || 0;
    return acc;
  }, { kcal:0, protein:0, carbs:0, fat:0 });
}

function swapMeal(day, category, currentId) {
  const pool = RECIPES[category].filter(r => r.id !== currentId);
  const newRecipe = pool[Math.floor(Math.random() * pool.length)];
  state.plan[day][category === 'brunch' ? 'brunch' : category] = newRecipe.id;
  render();
}

function getTodayKey() {
  return new Date().toISOString().slice(0,10);
}

function getGroceryList() {
  const map = {};
  for (const day of ALL_DAYS) {
    for (const { recipe } of getDayMeals(day)) {
      if (!recipe) continue;
      for (const ing of recipe.ingredients) {
        const key = ing.name.toLowerCase();
        if (!map[key]) map[key] = { name: ing.name, total: 0, unit: ing.unit };
        if (typeof ing.amount === 'number') map[key].total += ing.amount;
      }
    }
  }
  return Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
}

// ============================================================
// RENDER
// ============================================================
function render() {
  document.getElementById('app').innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    ${state.activeTab === 'plan'     ? renderPlanTab()     : ''}
    ${state.activeTab === 'hydration'? renderHydrationTab(): ''}
    ${state.activeTab === 'weight'   ? renderWeightTab()   : ''}
    ${state.activeTab === 'grocery'  ? renderGroceryTab()  : ''}
  `;
  attachEvents();
}

function renderHeader() {
  const t = getDayTotals(state.activeDay);
  const pct = Math.round((t.kcal / 1200) * 100);
  const barColor = t.kcal > 1280 ? 'bg-amber-400' : 'bg-emerald-400';
  return `
    <div class="mb-6">
      <div class="flex items-center justify-between mb-1">
        <h1 class="text-xl font-semibold tracking-tight">DietPlanner Pro</h1>
        <span class="text-xs text-zinc-500 font-medium">${new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })}</span>
      </div>
      <p class="text-xs text-zinc-500 mb-3">30-day fat-loss phase · 1,200 kcal target</p>
      ${state.activeTab === 'plan' ? `
      <div class="glass rounded-2xl p-4">
        <div class="flex justify-between items-baseline mb-2">
          <span class="text-xs text-zinc-500">${state.activeDay} total</span>
          <div class="flex items-baseline gap-1">
            <span class="text-lg font-semibold ${t.kcal > 1280 ? 'text-amber-400' : 'text-emerald-400'}">${t.kcal}</span>
            <span class="text-xs text-zinc-600">/ 1,200 kcal</span>
          </div>
        </div>
        <div class="w-full bg-zinc-800 rounded-full h-1.5 mb-3">
          <div class="${barColor} h-1.5 rounded-full transition-all duration-500" style="width:${Math.min(pct,100)}%"></div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center">
          ${[['Protein','protein','text-blue-400',t.protein,'g'],['Carbs','carbs','text-amber-400',t.carbs,'g'],['Fat','fat','text-rose-400',t.fat,'g']].map(([label,_,color,val,u])=>`
            <div>
              <div class="text-xs text-zinc-600 mb-0.5">${label}</div>
              <div class="text-sm font-semibold ${color}">${val}${u}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </div>
  `;
}

function renderTabs() {
  const tabs = [
    { id: 'plan',      icon: '📅', label: 'Planner' },
    { id: 'hydration', icon: '💧', label: 'Hydration' },
    { id: 'weight',    icon: '⚖️',  label: 'Log' },
    { id: 'grocery',   icon: '🛒', label: 'Grocery' },
  ];
  return `
    <div class="flex gap-2 mb-6 overflow-x-auto pb-1">
      ${tabs.map(t => `
        <button onclick="switchTab('${t.id}')"
          class="tab-btn flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium border transition-all duration-200 ${state.activeTab === t.id ? 'tab-active' : 'tab-inactive border-transparent'}">
          <span>${t.icon}</span><span>${t.label}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function renderPlanTab() {
  return `
    <div class="fade-in">
      ${renderDaySelector()}
      ${renderMealCards()}
    </div>
  `;
}

function renderDaySelector() {
  return `
    <div class="flex gap-1.5 mb-5 overflow-x-auto pb-1">
      ${ALL_DAYS.map(day => {
        const t = getDayTotals(day);
        const isActive = state.activeDay === day;
        const short = day.slice(0,3);
        const isWeekend = WEEKEND.includes(day);
        return `
          <button onclick="selectDay('${day}')"
            class="flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-2 rounded-xl border transition-all duration-200 min-w-[52px]
                   ${isActive ? 'bg-emerald-500/15 border-emerald-500/30 text-emerald-400' : 'glass border-zinc-800/50 text-zinc-400'}">
            <span class="text-[10px] font-medium">${short}</span>
            <span class="text-xs font-semibold">${t.kcal}</span>
            ${isWeekend ? '<span class="text-[8px] text-zinc-600">2 meals</span>' : '<span class="text-[8px] text-zinc-600">3 meals</span>'}
          </button>
        `;
      }).join('')}
    </div>
  `;
}

function renderMealCards() {
  const meals = getDayMeals(state.activeDay);
  return meals.map(({ slot, category, recipe }) => {
    if (!recipe) return '';
    const slotKey = category === 'brunch' ? 'brunch' : (slot === 'Breakfast' ? 'breakfast' : slot === 'Lunch' ? 'lunch' : 'dinner');
    return `
      <div class="meal-card glass rounded-2xl p-4 mb-3">
        <div class="flex items-start justify-between mb-2">
          <div>
            <span class="text-[10px] font-semibold text-emerald-400 uppercase tracking-widest">${slot}</span>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-xl">${recipe.emoji}</span>
              <h3 class="text-sm font-semibold leading-tight">${recipe.name}</h3>
            </div>
          </div>
          <button class="swap-btn text-zinc-500 hover:text-emerald-400 transition-colors text-lg ml-2 flex-shrink-0"
            onclick="swapMeal('${state.activeDay}','${slotKey}','${recipe.id}')">⇄</button>
        </div>
        <div class="flex items-center gap-3 mb-3">
          <span class="text-emerald-400 font-semibold text-sm">${recipe.kcal} kcal</span>
          <span class="text-[10px] text-zinc-600">·</span>
          <span class="text-[11px] text-zinc-500">⏱ ${recipe.time}</span>
        </div>
        <div class="grid grid-cols-3 gap-2 mb-3">
          ${[['P','protein','blue-400',recipe.protein],['C','carbs','amber-400',recipe.carbs],['F','fat','rose-400',recipe.fat]].map(([l,_,col,val])=>`
            <div class="bg-zinc-900 rounded-xl p-2 text-center">
              <div class="text-[9px] text-zinc-600 mb-0.5">${l}</div>
              <div class="text-xs font-semibold text-${col}">${val}g</div>
            </div>
          `).join('')}
        </div>
        <div>
          <div class="text-[10px] text-zinc-600 mb-1.5 uppercase tracking-wide">Ingredients</div>
          <div class="flex flex-wrap gap-1.5">
            ${recipe.ingredients.map(ing => `
              <span class="text-[11px] bg-zinc-900 text-zinc-400 rounded-lg px-2 py-0.5 border border-zinc-800">
                ${typeof ing.amount === 'number' ? `${ing.amount}${ing.unit}` : ing.unit} ${ing.name}
              </span>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderHydrationTab() {
  const cups   = Math.round(state.hydrationGoal / 250);
  const filled = Math.min(Math.round((state.hydration / state.hydrationGoal) * cups), cups);
  const pct    = Math.round((state.hydration / state.hydrationGoal) * 100);
  const radius = 54;
  const circ   = 2 * Math.PI * radius;
  const offset = circ - (pct / 100) * circ;
  return `
    <div class="fade-in">
      <div class="glass rounded-3xl p-6 mb-4 text-center">
        <svg width="140" height="140" class="mx-auto mb-3">
          <circle cx="70" cy="70" r="${radius}" fill="none" stroke="#27272a" stroke-width="8"/>
          <circle cx="70" cy="70" r="${radius}" fill="none" stroke="#10b981" stroke-width="8"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            stroke-linecap="round" transform="rotate(-90 70 70)"
            class="progress-ring"/>
          <text x="70" y="63" text-anchor="middle" fill="#f4f4f5" font-size="22" font-weight="600" font-family="-apple-system,sans-serif">${state.hydration}</text>
          <text x="70" y="82" text-anchor="middle" fill="#52525b" font-size="11" font-family="-apple-system,sans-serif">of ${state.hydrationGoal} ml</text>
        </svg>
        <p class="text-sm text-zinc-400 mb-1">${pct >= 100 ? '🎉 Daily goal reached!' : `${state.hydrationGoal - state.hydration} ml to go`}</p>
        <p class="text-xs text-zinc-600">Drink a glass before every meal to support digestion</p>
      </div>
      <div class="glass rounded-2xl p-4 mb-4">
        <div class="text-xs text-zinc-500 mb-3 uppercase tracking-wide">Tap to log water</div>
        <div class="grid grid-cols-5 gap-2 mb-4">
          ${Array.from({length: cups}, (_,i) => `
            <button onclick="toggleCup(${i})"
              class="hydration-dot aspect-square rounded-xl flex items-center justify-center text-xl transition-all duration-200 ${i < filled ? 'bg-emerald-500/20 border border-emerald-500/40' : 'bg-zinc-900 border border-zinc-800'}">
              💧
            </button>
          `).join('')}
        </div>
        <div class="flex gap-2">
          <button onclick="addHydration(250)" class="flex-1 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 text-emerald-400 text-xs font-medium py-2 rounded-xl transition-all">+ 250 ml</button>
          <button onclick="addHydration(500)" class="flex-1 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 text-emerald-400 text-xs font-medium py-2 rounded-xl transition-all">+ 500 ml</button>
          <button onclick="resetHydration()" class="bg-zinc-900 border border-zinc-800 text-zinc-500 text-xs font-medium py-2 px-3 rounded-xl transition-all">Reset</button>
        </div>
      </div>
      <div class="glass-green rounded-2xl p-4">
        <p class="text-xs text-emerald-400 font-medium mb-1">💡 Hydration tip</p>
        <p class="text-xs text-zinc-400">Before each meal, aim for a large 300–400 ml glass of water. This naturally reduces portion hunger and supports your metabolism.</p>
      </div>
    </div>
  `;
}

function renderWeightTab() {
  const entries = Object.entries(state.weightLog).sort((a,b)=>a[0].localeCompare(b[0])).slice(-7);
  const todayKey = getTodayKey();
  const todayLogged = state.weightLog[todayKey];
  return `
    <div class="fade-in">
      <div class="glass rounded-3xl p-5 mb-4">
        <div class="text-xs text-emerald-400 font-medium uppercase tracking-wide mb-1">Morning Weight</div>
        <p class="text-xs text-zinc-500 mb-4">Your weight naturally fluctuates day to day — this is normal and expected. Focus on the gentle trend over weeks, not daily numbers.</p>
        <div class="flex gap-3 items-end">
          <div class="flex-1">
            <label class="text-xs text-zinc-600 block mb-1">Today's weight (kg)</label>
            <input type="number" step="0.1" min="40" max="200" id="weightInputEl"
              value="${state.weightInput}"
              oninput="state.weightInput = this.value"
              class="weight-input w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-emerald-500/50 transition-colors"
              placeholder="e.g. 61.2"/>
          </div>
          <button onclick="logWeight()" class="bg-emerald-500 hover:bg-emerald-400 text-black font-semibold text-xs px-4 py-2.5 rounded-xl transition-all">Log</button>
        </div>
        ${todayLogged ? `<p class="text-xs text-emerald-400 mt-2">✓ Logged today: ${todayLogged} kg</p>` : ''}
      </div>
      ${entries.length > 0 ? `
        <div class="glass rounded-2xl p-4 mb-4">
          <div class="text-xs text-zinc-500 uppercase tracking-wide mb-3">Recent entries</div>
          ${entries.map(([date, weight], i) => {
            const prev = i > 0 ? entries[i-1][1] : null;
            const diff = prev ? (weight - prev).toFixed(1) : null;
            let trend = '';
            if (diff !== null) {
              const n = parseFloat(diff);
              if (n < 0) trend = `<span class="text-emerald-400 text-xs">▼ ${Math.abs(n)}</span>`;
              else if (n > 0) trend = `<span class="text-zinc-400 text-xs">▲ ${n}</span>`;
              else trend = `<span class="text-zinc-600 text-xs">— same</span>`;
            }
            return `
              <div class="flex justify-between items-center py-2 border-b border-zinc-900">
                <span class="text-xs text-zinc-500">${new Date(date + 'T12:00').toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'})}</span>
                <div class="flex items-center gap-3">
                  ${trend}
                  <span class="text-sm font-medium">${weight} kg</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}
      <div class="glass-green rounded-2xl p-4">
        <p class="text-xs text-emerald-400 font-medium mb-1">💚 Mindset reminder</p>
        <p class="text-xs text-zinc-400">Hormonal shifts, hydration, and digestion can all move the scale by 1–2 kg overnight. You're on the right path — consistent habits matter far more than today's number.</p>
      </div>
    </div>
  `;
}

function renderGroceryTab() {
  const list = getGroceryList();
  const categories = {
    '🥩 Meat & Fish':    ['chicken', 'beef', 'salmon', 'sea bass', 'tuna', 'prawn', 'pork', 'bacon'],
    '🥬 Produce':        ['tomato', 'courgette', 'lettuce', 'spinach', 'broccoli', 'pepper', 'onion', 'garlic', 'ginger', 'avocado', 'lemon', 'lime', 'apple', 'aubergine', 'cucumber', 'carrot', 'pak choi', 'mint', 'coriander', 'spring onion', 'chives', 'mushroom', 'corn'],
    '🧀 Dairy & Eggs':   ['egg', 'milk', 'yogurt', 'feta', 'parmesan', 'cream'],
    '🫙 Pantry':         ['oat', 'rice', 'noodle', 'pasta', 'bread', 'konjac', 'miso', 'soy', 'vinegar', 'sesame', 'kimchi', 'chia', 'honey', 'mirin', 'stock', 'oil', 'paprika', 'cumin', 'cajun', 'pepper', 'cinnamon', 'vanilla', 'chilli', 'oregano', 'thyme', 'tomatoes (tinned)'],
    '🛒 Other':          []
  };
  function categorise(item) {
    const n = item.name.toLowerCase();
    for (const [cat, keywords] of Object.entries(categories)) {
      if (cat === '🛒 Other') continue;
      if (keywords.some(k => n.includes(k))) return cat;
    }
    return '🛒 Other';
  }
  const grouped = {};
  for (const item of list) {
    const cat = categorise(item);
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  }
  return `
    <div class="fade-in">
      <div class="glass rounded-2xl p-4 mb-4">
        <div class="flex items-center justify-between mb-2">
          <div>
            <div class="text-sm font-semibold">Weekly Grocery List</div>
            <div class="text-xs text-zinc-500">All 7 days · ${list.length} ingredients</div>
          </div>
          <button onclick="copyGrocery()" class="bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 text-emerald-400 text-xs font-medium px-3 py-1.5 rounded-xl transition-all">Copy list</button>
        </div>
      </div>
      ${Object.entries(grouped).filter(([,items])=>items.length>0).map(([cat, items]) => `
        <div class="glass rounded-2xl p-4 mb-3">
          <div class="text-xs font-semibold text-zinc-400 mb-2">${cat}</div>
          ${items.map(item => `
            <div class="grocery-item flex justify-between items-center py-1.5">
              <span class="text-sm text-zinc-300">${item.name}</span>
              <span class="text-xs font-medium text-emerald-400">${item.unit === 'whole' || item.unit === 'whole lemon' ? Math.ceil(item.total) + ' whole' : Math.round(item.total) + item.unit}</span>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `;
}

// ============================================================
// EVENTS
// ============================================================
function attachEvents() {}

function switchTab(tab) {
  state.activeTab = tab;
  render();
}

function selectDay(day) {
  state.activeDay = day;
  render();
}

function swapMeal(day, category, currentId) {
  const pool = RECIPES[category].filter(r => r.id !== currentId);
  if (!pool.length) return;
  const newR = pool[Math.floor(Math.random() * pool.length)];
  const slotMap = { breakfast:'breakfast', lunch:'lunch', dinner:'dinner', brunch:'brunch' };
  state.plan[day][slotMap[category]] = newR.id;
  render();
}

function addHydration(ml) {
  state.hydration = Math.min(state.hydration + ml, state.hydrationGoal * 1.5);
  render();
}

function resetHydration() {
  state.hydration = 0;
  render();
}

function toggleCup(i) {
  const cups = Math.round(state.hydrationGoal / 250);
  const filled = Math.round((state.hydration / state.hydrationGoal) * cups);
  if (i < filled) {
    state.hydration = Math.max(0, state.hydration - 250);
  } else {
    state.hydration = Math.min(state.hydration + 250, state.hydrationGoal * 1.5);
  }
  render();
}

function logWeight() {
  const val = parseFloat(document.getElementById('weightInputEl')?.value || state.weightInput);
  if (!val || val < 30 || val > 300) return;
  state.weightLog[getTodayKey()] = val;
  localStorage.setItem('dp_weight', JSON.stringify(state.weightLog));
  state.weightInput = '';
  render();
}

function copyGrocery() {
  const list = getGroceryList();
  const text = list.map(item => {
    const qty = item.unit === 'whole' || item.unit === 'whole lemon'
      ? Math.ceil(item.total) + ' whole'
      : Math.round(item.total) + item.unit;
    return `• ${item.name}: ${qty}`;
  }).join('\n');
  navigator.clipboard.writeText('WEEKLY GROCERY LIST\n\n' + text).then(() => {
    const btn = document.querySelector('[onclick="copyGrocery()"]');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = 'Copy list'; }, 2000); }
  });
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
