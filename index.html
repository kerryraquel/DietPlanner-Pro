<!DOCTYPE html>
<html lang="zh-TW" class="h-full bg-slate-50 selection:bg-indigo-500/10 select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DietPlanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
                    boxShadow: { 'native': '0 8px 30px rgb(0 0 0 / 0.04)' }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
        .safe-top { padding-top: calc(env(safe-area-inset-top) + 12px); }
    </style>
</head>
<body class="h-full font-sans text-slate-800 antialiased flex justify-center bg-slate-100">

    <div id="app" class="w-full max-w-md bg-slate-50 min-h-screen flex flex-col relative overflow-x-hidden shadow-2xl shadow-slate-300/50">
        
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100 safe-top px-4 pb-3">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <h1 class="text-xs font-semibold uppercase tracking-wider text-slate-400">DietPlanner Pro</h1>
                    <p class="text-lg font-bold text-slate-900 flex items-center gap-1.5">
                        單人極致配額系統 <span class="text-xs px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full font-medium">1100 kcal</span>
                    </p>
                </div>
                <div class="flex gap-2">
                    <button onclick="openDatabaseDrawer()" class="text-xs px-2.5 py-1.5 rounded-xl font-medium transition-all duration-200 border border-slate-200 bg-white text-indigo-600 flex items-center gap-1 shadow-sm active:scale-95">
                        <i class="fa-solid fa-database"></i> 資料庫
                    </button>
                    <button onclick="togglePrepMode()" id="prepBadge" class="text-xs px-2.5 py-1.5 rounded-xl font-medium transition-all duration-200 border border-slate-200 bg-white text-slate-600 flex items-center gap-1">
                        <i class="fa-solid fa-kitchen-set"></i> 備餐
                    </button>
                </div>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="dayTabs">
                </div>
        </header>

        <main class="flex-1 px-4 py-4 space-y-4 pb-24 overflow-y-auto">
            
            <div class="bg-white rounded-2xl shadow-native p-4 border border-slate-100/80">
                <div class="flex items-center justify-between mb-4">
                    <div class="space-y-0.5">
                        <span class="text-xs font-medium text-slate-400">今日總熱量消耗上限</span>
                        <div class="flex items-baseline gap-1">
                            <span id="globalTargetCal" class="text-3xl font-black tracking-tight text-slate-900">1100</span>
                            <span class="text-xs font-bold text-slate-500">kcal</span>
                        </div>
                    </div>
                    <div class="text-right space-y-0.5">
                        <span class="text-xs font-medium text-slate-400">固定巴西堅果配額</span>
                        <div class="text-sm font-semibold text-amber-700 flex items-center justify-end gap-1">
                            <i class="fa-solid fa-seedling text-xs"></i> 33 kcal (10g)
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 pt-2 border-t border-slate-50">
                    <div class="bg-slate-50 p-2.5 rounded-xl text-center">
                        <span class="text-[10px] font-bold text-slate-400 block mb-0.5">蛋白質</span>
                        <span id="macroP" class="text-sm font-bold text-slate-700">--</span>
                    </div>
                    <div class="bg-slate-50 p-2.5 rounded-xl text-center">
                        <span class="text-[10px] font-bold text-slate-400 block mb-0.5">碳水化合物</span>
                        <span id="macroC" class="text-sm font-bold text-slate-700">--</span>
                    </div>
                    <div class="bg-slate-50 p-2.5 rounded-xl text-center">
                        <span class="text-[10px] font-bold text-slate-400 block mb-0.5">脂肪</span>
                        <span id="macroF" class="text-sm font-bold text-slate-700">--</span>
                    </div>
                </div>
            </div>

            <div id="mealsContainer" class="space-y-4">
                </div>

            <div class="bg-white rounded-2xl shadow-native p-4 border border-slate-100/80 flex items-center justify-between">
                <div class="space-y-1">
                    <h3 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-droplet text-blue-500"></i> 每日水分攝取上限
                    </h3>
                    <p class="text-xs text-slate-400">維持代謝效率，目標 2500g</p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="updateWater(-250)" class="w-8 h-8 rounded-xl bg-slate-50 active:scale-95 text-slate-500 flex items-center justify-center font-bold text-sm border border-slate-100">-</button>
                    <span id="waterDisplay" class="text-base font-black text-blue-600 min-w-[65px] text-center">0g</span>
                    <button onclick="updateWater(250)" class="w-8 h-8 rounded-xl bg-blue-50 active:scale-95 text-blue-600 flex items-center justify-center font-bold text-sm border border-blue-100">+</button>
                </div>
            </div>

        </main>

        <div id="recipeDrawer" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 transition-opacity duration-300 opacity-0 pointer-events-none" onclick="closeDrawer()">
            <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 pointer-events-auto safe-bottom px-4 pt-5 pb-4" onclick="event.stopPropagation()">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-5"></div>
                
                <div class="flex items-start justify-between mb-4">
                    <div>
                        <span id="drawerTag" class="text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider mb-1 inline-block">--</span>
                        <h2 id="drawerTitle" class="text-xl font-bold text-slate-900">精選餐單明細</h2>
                        <p id="drawerRecipeName" class="text-xs text-indigo-600 font-semibold mt-0.5">--</p>
                    </div>
                    <button onclick="closeDrawer()" class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>

                <div class="mb-4 bg-slate-50 p-3 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-semibold text-slate-500">此餐熱量小計</span>
                    <span id="drawerCal" class="text-2xl font-black text-slate-900">-- <span class="text-xs font-bold text-slate-400">kcal</span></span>
                </div>

                <div class="space-y-2 max-h-[260px] overflow-y-auto no-scrollbar pr-1" id="drawerIngredients">
                    </div>
            </div>
        </div>

        <div id="databaseDrawer" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 transition-opacity duration-300 opacity-0 pointer-events-none" onclick="closeDatabaseDrawer()">
            <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 pointer-events-auto safe-bottom px-4 pt-5 pb-4 h-[80vh] flex flex-col" onclick="event.stopPropagation()">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4 flex-shrink-0"></div>
                
                <div class="flex items-center justify-between mb-4 flex-shrink-0">
                    <div>
                        <h2 class="text-lg font-bold text-slate-900">DietPlanner 核心料理庫</h2>
                        <p class="text-xs text-slate-400">全餐單嚴格採用純克數 (g) 封裝，無魔芋殘留</p>
                    </div>
                    <button onclick="closeDatabaseDrawer()" class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-4" id="databaseContent">
                    </div>
            </div>
        </div>

    </div>

    <script>
        // Reactive State Management Structure
        const state = {
            currentDay: 0,
            prepMode: false,
            waterIntake: 0,
            days: [
                { name: '週一', type: 'weekday', breakfast: 250, lunch: 580 },
                { name: '週二', type: 'weekday', breakfast: 210, lunch: 565 },
                { name: '週三', type: 'weekday', breakfast: 310, lunch: 590 },
                { name: '週四', type: 'weekday', breakfast: 190, lunch: 550 },
                { name: '週五', type: 'weekday', breakfast: 280, lunch: 575 },
                { name: '週六', type: 'weekend', breakfast: 0,   lunch: 600 },
                { name: '週日', type: 'weekend', breakfast: 0,   lunch: 585 }
            ],
            // User current selection mapping for recipe swapping
            selectedRecipes: {
                breakfast: 0,
                lunch: 0,
                dinner: 0
            },
            macros: { P: '75g', C: '120g', F: '36g' }
        };

        // Comprehensive Verified Database with Multi-Recipe Options per Meal Category
        const recipeDatabase = {
            breakfast: [
                {
                    id: 'b1',
                    name: '香蕉玉桂隔夜燕麥',
                    ingredients: [
                        { name: '大燕麥片', qty: 45 },
                        { name: '無糖豆漿粉', qty: 15 },
                        { name: '熟香蕉肉', qty: 60 },
                        { name: '奇亞籽', qty: 10 },
                        { name: '肉桂粉', qty: 2 },
                        { name: '溫開水', qty: 150 }
                    ]
                },
                {
                    id: 'b2',
                    name: '鮮果烤燕麥配希臘乳酪',
                    ingredients: [
                        { name: '大燕麥片', qty: 40 },
                        { name: '全蛋液', qty: 50 },
                        { name: '希臘優格', qty: 100 },
                        { name: '冷凍綜合莓果', qty: 40 },
                        { name: '赤蘚糖醇', qty: 5 }
                    ]
                },
                {
                    id: 'b3',
                    name: '經典高效水煮雞胸輕食',
                    ingredients: [
                        { name: '水煮雞胸肉', qty: 120 },
                        { name: '希臘優格', qty: 150 },
                        { name: '奇亞籽', qty: 15 },
                        { name: '大燕麥片', qty: 35 }
                    ]
                }
            ],
            lunch: [
                {
                    id: 'l1',
                    name: '低脂鮮蝦板豆腐藜麥飯',
                    ingredients: [
                        { name: '1:1 Quinoa Brown/White Rice (1:1 藜麥白米)', qty: 140 },
                        { name: '低脂鮮蝦仁', qty: 110 },
                        { name: '香煎板豆腐', qty: 80 },
                        { name: '水煮青花菜', qty: 150 },
                        { name: '初榨橄欖油', qty: 8 }
                    ]
                },
                {
                    id: 'l2',
                    name: '香烤鯖魚佐香菇炒藜麥飯',
                    ingredients: [
                        { name: '1:1 Quinoa Brown/White Rice (1:1 藜麥白米)', qty: 120 },
                        { name: '薄鹽烤鯖魚', qty: 90 },
                        { name: '鮮香菇片', qty: 70 },
                        { name: '黃豆芽', qty: 100 },
                        { name: '不飽和植物油', qty: 6 }
                    ]
                }
            ],
            dinner: [
                {
                    id: 'd1',
                    name: '乾煎鮭魚菲力沙拉減脂餐',
                    ingredients: [
                        { name: '乾煎大西洋鮭魚菲力', qty: 130 },
                        { name: '綜合綠葉嫩生菜', qty: 120 },
                        { name: '溫室小黃瓜條', qty: 90 },
                        { name: '水煮去殼雞蛋', qty: 50 },
                        { name: '特調無糖油醋汁', qty: 12 }
                    ]
                },
                {
                    id: 'd2',
                    name: '舒肥嫩牛肉鮮蔬低碳餐',
                    ingredients: [
                        { name: '舒肥牛里肌切片', qty: 140 },
                        { name: '炙烤櫛瓜片', qty: 100 },
                        { name: '精選蒸南瓜塊', qty: 80 },
                        { name: '芝麻葉嫩葉', qty: 50 },
                        { name: '冷壓亞麻仁油', qty: 10 }
                    ]
                }
            ]
        };

        function getCarbTag(cal) {
            if (cal === 0) return { text: '斷食空窗', class: 'bg-purple-50 text-purple-700 border-purple-100' };
            if (cal < 250) return { text: '極低碳燃脂', class: 'bg-emerald-50 text-emerald-700 border-emerald-100' };
            if (cal <= 500) return { text: '控碳穩定', class: 'bg-blue-50 text-blue-700 border-blue-100' };
            return { text: '高飽腹充能', class: 'bg-orange-50 text-orange-700 border-orange-100' };
        }

        function initApp() {
            renderTabs();
            renderDashboard();
            buildDatabaseView();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('dayTabs');
            tabsContainer.innerHTML = state.days.map((day, idx) => {
                const isActive = idx === state.currentDay;
                return `
                    <button onclick="switchDay(${idx})" class="flex-1 min-w-[64px] py-2 px-1 rounded-xl text-center transition-all duration-200 border ${
                        isActive 
                        ? 'bg-slate-900 border-slate-900 text-white font-bold shadow-sm' 
                        : 'bg-white border-slate-100 text-slate-500 font-medium hover:bg-slate-50'
                    }">
                        <span class="text-xs block">${day.name}</span>
                        <span class="text-[9px] opacity-70 block mt-0.5">${day.type === 'weekend' ? '週末' : '常規'}</span>
                    </button>
                `;
            }).join('');
        }

        function renderDashboard() {
            const day = state.days[state.currentDay];
            
            const breakfastCal = day.breakfast;
            const lunchCal = day.lunch;
            const nutCal = 33;
            const dinnerCal = 1100 - breakfastCal - lunchCal - nutCal;

            document.getElementById('macroP').innerText = state.macros.P;
            document.getElementById('macroC').innerText = state.macros.C;
            document.getElementById('macroF').innerText = state.macros.F;

            const meals = [
                { id: 'breakfast', name: '高效輕食早餐', cal: breakfastCal, icon: 'fa-egg', time: '08:30' },
                { id: 'lunch', name: '豐盛飽腹午餐', cal: lunchCal, icon: 'fa-bowl-food', time: '12:30' },
                { id: 'dinner', name: '燃脂收尾晚餐', cal: dinnerCal, icon: 'fa-fire', time: '18:30' }
            ];

            const container = document.getElementById('mealsContainer');
            container.innerHTML = meals.map(meal => {
                const tag = getCarbTag(meal.cal);
                const isDisabled = meal.cal === 0;
                
                // Get current assigned active recipe name from DB
                const activeRecipeIdx = state.selectedRecipes[meal.id];
                const activeRecipe = recipeDatabase[meal.id][activeRecipeIdx] || recipeDatabase[meal.id][0];

                // Build option list for switcher dropdown select element
                const optionsHtml = recipeDatabase[meal.id].map((rcp, rIdx) => `
                    <option value="${rIdx}" ${rIdx === activeRecipeIdx ? 'selected' : ''}>${rcp.name}</option>
                `).join('');

                return `
                    <div class="bg-white rounded-2xl shadow-native border border-slate-100/80 overflow-hidden transition-all duration-200 ${isDisabled ? 'opacity-50' : ''}">
                        <div class="p-4 space-y-3">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-700 border border-slate-100">
                                        <i class="fa-solid ${meal.icon} text-base"></i>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-1.5">
                                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">${meal.name}</h4>
                                            <span class="text-[10px] px-1.5 py-0.5 border rounded font-semibold ${tag.class}">${tag.text}</span>
                                        </div>
                                        <p class="text-sm font-bold text-slate-900 mt-0.5">${isDisabled ? '此時段不進食' : activeRecipe.name}</p>
                                    </div>
                                </div>
                                
                                <div class="text-right flex items-center gap-3">
                                    <div class="space-y-0.5">
                                        <span class="text-xl font-black tracking-tight text-slate-950 block">${meal.cal}</span>
                                        <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-wider">kcal</span>
                                    </div>
                                    <button ${isDisabled ? 'disabled' : ''} onclick="openDrawer('${meal.id}', ${meal.cal})" class="w-8 h-8 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 active:scale-95 disabled:pointer-events-none transition-transform">
                                        <i class="fa-solid fa-list-ul text-xs"></i>
                                    </button>
                                </div>
                            </div>

                            ${!isDisabled ? `
                            <div class="pt-2 border-t border-slate-50 flex items-center justify-between gap-2">
                                <span class="text-[11px] font-medium text-slate-400 flex items-center gap-1">
                                    <i class="fa-solid fa-arrows-rotate"></i> 更換本日菜式
                                </span>
                                <select onchange="swapRecipe('${meal.id}', this.value)" class="text-xs bg-slate-50 border border-slate-200 text-slate-700 rounded-lg px-2 py-1 max-w-[200px] font-medium outline-none focus:border-indigo-500 transition-colors">
                                    ${optionsHtml}
                                </select>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function swapRecipe(mealId, index) {
            state.selectedRecipes[mealId] = parseInt(index);
            renderDashboard();
        }

        function switchDay(index) {
            state.currentDay = index;
            renderTabs();
            renderDashboard();
        }

        function togglePrepMode() {
            state.prepMode = !state.prepMode;
            const btn = document.getElementById('prepBadge');
            if(state.prepMode) {
                btn.classList.remove('bg-white', 'text-slate-600');
                btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
            } else {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                btn.classList.add('bg-white', 'text-slate-600');
            }
            if (document.getElementById('recipeDrawer').classList.contains('opacity-100')) {
                const activeId = document.getElementById('recipeDrawer').dataset.activeId;
                const activeCal = document.getElementById('recipeDrawer').dataset.activeCal;
                if(activeId) openDrawer(activeId, activeCal);
            }
        }

        function updateWater(amt) {
            state.waterIntake = Math.max(0, state.waterIntake + amt);
            document.getElementById('waterDisplay').innerText = `${state.waterIntake}g`;
        }

        function openDrawer(mealId, cal) {
            const drawer = document.getElementById('recipeDrawer');
            const tagEl = document.getElementById('drawerTag');
            const titleEl = document.getElementById('drawerTitle');
            const subTitleEl = document.getElementById('drawerRecipeName');
            const calEl = document.getElementById('drawerCal');
            const ingContainer = document.getElementById('drawerIngredients');

            drawer.dataset.activeId = mealId;
            drawer.dataset.activeCal = cal;

            const tagData = getCarbTag(cal);
            tagEl.innerText = tagData.text;
            tagEl.className = `text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider mb-1 inline-block ${tagData.class}`;
            
            const mealNames = { breakfast: '高效輕食早餐', lunch: '豐盛飽腹午餐', dinner: '燃脂收尾晚餐' };
            titleEl.innerText = mealNames[mealId];
            
            const activeRecipeIdx = state.selectedRecipes[mealId];
            const activeRecipe = recipeDatabase[mealId][activeRecipeIdx] || recipeDatabase[mealId][0];
            subTitleEl.innerText = activeRecipe.name;
            
            calEl.innerHTML = `${cal} <span class="text-xs font-bold text-slate-400">kcal</span>`;

            const multiplier = state.prepMode ? 3 : 1;
            const ingredients = activeRecipe.ingredients || [];

            ingContainer.innerHTML = ingredients.map(ing => `
                <div class="flex items-center justify-between p-3 bg-slate-50/60 rounded-xl border border-slate-100">
                    <span class="text-xs font-semibold text-slate-800">${ing.name}</span>
                    <span class="text-xs font-bold text-slate-900 tracking-tight bg-white px-2.5 py-1 rounded-lg shadow-sm border border-slate-100/60">${(ing.qty * multiplier)}g</span>
                </div>
            `).join('');

            drawer.classList.remove('opacity-0', 'pointer-events-none');
            drawer.classList.add('opacity-100');
            drawer.firstElementChild.classList.remove('translate-y-full');
        }

        function closeDrawer() {
            const drawer = document.getElementById('recipeDrawer');
            drawer.classList.add('opacity-0', 'pointer-events-none');
            drawer.classList.remove('opacity-100');
            drawer.firstElementChild.classList.add('translate-y-full');
        }

        // Global Classified Database Engine Drawer Functions
        function buildDatabaseView() {
            const container = document.getElementById('databaseContent');
            const categories = [
                { id: 'breakfast', title: '☀️ 高效輕食早餐庫' },
                { id: 'lunch', title: '🍱 豐盛飽腹午餐庫' },
                { id: 'dinner', title: '🔥 燃脂收尾晚餐庫' }
            ];

            container.innerHTML = categories.map(cat => {
                const recipes = recipeDatabase[cat.id];
                const cardsHtml = recipes.map(rcp => {
                    const ingList = rcp.ingredients.map(i => `${i.name}(${i.qty}g)`).join(' · ');
                    return `
                        <div class="p-3 bg-slate-50/70 rounded-xl border border-slate-100 space-y-1">
                            <h4 class="text-xs font-bold text-slate-900 flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span> ${rcp.name}
                            </h4>
                            <p class="text-[11px] text-slate-500 leading-relaxed">${ingList}</p>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="space-y-2">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider px-1">${cat.title}</h3>
                        <div class="space-y-2">
                            ${cardsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openDatabaseDrawer() {
            const dbDrawer = document.getElementById('databaseDrawer');
            dbDrawer.classList.remove('opacity-0', 'pointer-events-none');
            dbDrawer.classList.add('opacity-100');
            dbDrawer.firstElementChild.classList.remove('translate-y-full');
        }

        function closeDatabaseDrawer() {
            const dbDrawer = document.getElementById('databaseDrawer');
            dbDrawer.classList.add('opacity-0', 'pointer-events-none');
            dbDrawer.classList.remove('opacity-100');
            dbDrawer.firstElementChild.classList.add('translate-y-full');
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
