<!DOCTYPE html>
<html lang="zh-TW" class="h-full bg-slate-50 selection:bg-indigo-500/10 select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DietPlanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
                    boxShadow: { 'native': '0 8px 30px rgb(0 0 0 / 0.04)' }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
        .safe-top { padding-top: calc(env(safe-area-inset-top) + 12px); }
    </style>
</head>
<body class="h-full font-sans text-slate-800 antialiased flex justify-center bg-slate-100">

                </div>
                <div class="flex gap-1.5">

        <main class="flex-1 px-4 py-4 space-y-4 pb-24 overflow-y-auto">
            
            <div class="bg-white rounded-2xl shadow-native p-4 border border-slate-100/80">

                        </div>

                </div>

                        <span class="text-sm font-bold text-slate-700">75g</span>

                    <div class="bg-slate-50 p-2.5 rounded-xl text-center">

                        <span class="text-sm font-bold text-slate-700">120g</span>
                    </div>
                    <div class="bg-slate-50 p-2.5 rounded-xl text-center">

                        <span class="text-sm font-bold text-slate-700">36g</span>

            </div>

                    </button>
