        function getCarbTag(cal) {
            if (cal === 0) return { text: '斷食', class: 'bg-slate-100 text-slate-400 border-slate-200' };
            if (cal > 400) return { text: '優質高碳', class: 'bg-emerald-50 text-emerald-600 border-emerald-200' };
            return { text: '控碳控脂', class: 'bg-indigo-50 text-indigo-600 border-indigo-200' };
        }

        function initApp() {
            renderTabs();
            renderDashboard();
            buildDatabaseView();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('dayTabs');
            tabsContainer.innerHTML = state.days.map((day, idx) => {
                const isActive = idx === state.currentDay;
                return `
                    <button onclick="switchDay(${idx})" class="flex-1 min-w-[64px] py-2 px-1 rounded-xl text-center transition-all duration-200 border ${
                        isActive 
                        ? 'bg-slate-900 border-slate-900 text-white font-bold shadow-sm' 
                        : 'bg-white border-slate-100 text-slate-500 font-medium hover:bg-slate-50'
                    }">
                        <span class="text-xs block">${day.name}</span>
                        <span class="text-[9px] opacity-70 block mt-0.5">${day.type === 'weekend' ? '斷食日' : '常規日'}</span>
                    </button>
                `;
            }).join('');
        }

        function renderDashboard() {
            const day = state.days[state.currentDay];
            const breakfastCal = day.breakfast;
            const lunchCal = day.lunch;
            const nutCal = 33;
            const dinnerCal = 1100 - breakfastCal - lunchCal - nutCal;

            document.getElementById('macroP').innerText = state.macros.P;
            document.getElementById('macroC').innerText = state.macros.C;
            document.getElementById('macroF').innerText = state.macros.F;

            const meals = [
                { id: 'breakfast', name: '高效輕食早餐', cal: breakfastCal, icon: 'fa-egg' },
                { id: 'lunch', name: '豐盛飽腹午餐', cal: lunchCal, icon: 'fa-bowl-food' },
                { id: 'dinner', name: '燃脂收尾晚餐', cal: dinnerCal, icon: 'fa-fire' }
            ];

            const container = document.getElementById('mealsContainer');
            container.innerHTML = meals.map(meal => {
                const tag = getCarbTag(meal.cal);
                const isDisabled = meal.cal === 0;
                
                const dayConfig = state.dayRecipeMap[state.currentDay];
                const activeRecipeIdx = dayConfig[meal.id];
                const activeRecipe = recipeDatabase[meal.id][activeRecipeIdx] || recipeDatabase[meal.id][0];

                const optionsHtml = recipeDatabase[meal.id].map((rcp, rIdx) => `
                    <option value="${rIdx}" ${rIdx === activeRecipeIdx ? 'selected' : ''}>${rcp.name}</option>
                `).join('');

                return `
                    <div class="bg-white rounded-2xl shadow-native border border-slate-100/80 overflow-hidden transition-all duration-200 ${isDisabled ? 'opacity-50' : ''}">
                        <div class="p-4 space-y-3">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-700 border border-slate-100">
                                        <i class="fa-solid ${meal.icon} text-base"></i>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-1.5">
                                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">${meal.name}</h4>
                                            <span class="text-[10px] px-1.5 py-0.5 border rounded font-semibold ${tag.class}">${tag.text}</span>
                                        </div>
                                        <p class="text-sm font-bold text-slate-900 mt-0.5">${isDisabled ? '週末不進早餐 · 配額累計至午晚' : activeRecipe.name}</p>
                                    </div>
                                </div>
                                
                                <div class="text-right flex items-center gap-3">
                                    <div class="space-y-0.5">
                                        <span class="text-xl font-black tracking-tight text-slate-950 block">${meal.cal}</span>
                                        <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-wider">kcal</span>
                                    </div>
                                    <button ${isDisabled ? 'disabled' : ''} onclick="openDrawer('${meal.id}', ${meal.cal})" class="w-8 h-8 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 active:scale-95 disabled:pointer-events-none transition-transform">
                                        <i class="fa-solid fa-gears text-xs"></i>
                                    </button>
                                </div>
                            </div>

                            ${!isDisabled ? `
                            <div class="pt-2 border-t border-slate-50 flex items-center justify-between gap-2">
                                <span class="text-[11px] font-medium text-slate-400 flex items-center gap-1">
                                    <i class="fa-solid fa-arrows-rotate"></i> 本日推薦切換
                                </span>
                                <select onchange="swapRecipe('${meal.id}', this.value)" class="text-xs bg-slate-50 border border-slate-200 text-slate-700 rounded-lg px-2 py-1 max-w-[220px] font-medium outline-none focus:border-indigo-500">
                                    ${optionsHtml}
                                </select>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function swapRecipe(mealId, index) {
            state.dayRecipeMap[state.currentDay][mealId] = parseInt(index);
            renderDashboard();
        }

        function switchDay(index) {
            state.currentDay = index;
            renderTabs();
            renderDashboard();
        }

        function toggleServings() {
            state.isTwoServings = !state.isTwoServings;
            const btn = document.getElementById('servingsBtn');
            if(state.isTwoServings) {
                btn.classList.remove('bg-white', 'text-slate-700');
                btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                btn.innerHTML = `<i class="fa-solid fa-users text-white"></i> 二人份量`;
            } else {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                btn.classList.add('bg-white', 'text-slate-700');
                btn.innerHTML = `<i class="fa-solid fa-users text-indigo-500"></i> 單人份`;
            }
            refreshActiveDrawerIfOpen();
        }

        function togglePrepMode() {
            state.prepMode = !state.prepMode;
            const btn = document.getElementById('prepBadge');
            if(state.prepMode) {
                btn.classList.remove('bg-white', 'text-slate-600');
                btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
            } else {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                btn.classList.add('bg-white', 'text-slate-600');
            }
            refreshActiveDrawerIfOpen();
        }

        function refreshActiveDrawerIfOpen() {
            if (document.getElementById('recipeDrawer').classList.contains('opacity-100')) {
                const activeId = document.getElementById('recipeDrawer').dataset.activeId;
                const activeCal = document.getElementById('recipeDrawer').dataset.activeCal;
                if(activeId) openDrawer(activeId, activeCal);
            }
        }

        function updateWater(amt) {
            state.waterIntake = Math.max(0, state.waterIntake + amt);
            document.getElementById('waterDisplay').innerText = `${state.waterIntake}g`;
        }

        function openDrawer(mealId, cal) {
            const drawer = document.getElementById('recipeDrawer');
            const tagEl = document.getElementById('drawerTag');
            const titleEl = document.getElementById('drawerTitle');
            const subTitleEl = document.getElementById('drawerRecipeName');
            const calEl = document.getElementById('drawerCal');
            const noticeEl = document.getElementById('drawerScaleNotice');
            const ingContainer = document.getElementById('drawerIngredients');

            drawer.dataset.activeId = mealId;
            drawer.dataset.activeCal = cal;

            const tagData = getCarbTag(cal);
            tagEl.innerText = tagData.text;
            tagEl.className = `text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider mb-1 inline-block ${tagData.class}`;
            
            const mealNames = { breakfast: '高效輕食早餐', lunch: '豐盛飽腹午餐', dinner: '燃脂收尾晚餐' };
            titleEl.innerText = mealNames[mealId];
            
            const dayConfig = state.dayRecipeMap[state.currentDay];
            const activeRecipeIdx = dayConfig[mealId];
            const activeRecipe = recipeDatabase[mealId][activeRecipeIdx] || recipeDatabase[mealId][0];
            subTitleEl.innerText = activeRecipe.name;
            
            calEl.innerHTML = `${cal * (state.isTwoServings ? 2 : 1)} <span class="text-xs font-bold text-slate-400">kcal ${state.isTwoServings ? '(二人合計)' : ''}</span>`;

            const calScaleFactor = cal / activeRecipe.baseCal;
            const servingsMultiplier = state.isTwoServings ? 2 : 1;
            const prepMultiplier = state.prepMode ? 3 : 1;
            const finalMultiplier = calScaleFactor * servingsMultiplier * prepMultiplier;

            noticeEl.innerHTML = `<i class="fa-solid fa-calculator"></i> 當前用量權重計算：配額縮放(${calScaleFactor.toFixed(2)}倍) 
                × 人數(${servingsMultiplier}倍) × 批量備餐(${prepMultiplier}倍) = <b>總計 ${(finalMultiplier).toFixed(2)} 倍重量</b>`;

            ingContainer.innerHTML = activeRecipe.ingredients.map((ing, index) => {
                const subKey = `${activeRecipe.id}_${index}`;
                const displayName = state.substitutions[subKey] || ing.name;
                const originalName = ing.name;
                const calculatedQty = Math.max(1, Math.round(ing.qty * finalMultiplier));
                const hasSubstitutes = substitutionPool[originalName] && substitutionPool[originalName].length > 0;

                return `
                    <div class="flex items-center justify-between p-2.5 bg-slate-50/60 rounded-xl border border-slate-100 transition-all duration-200">
                        <div class="space-y-0.5">
                            <span class="text-xs font-semibold text-slate-800 block">${displayName}</span>
                            ${hasSubstitutes ? `
                                <button onclick="triggerSubstitute('${activeRecipe.id}', ${index}, '${originalName}')" class="text-[10px] text-indigo-500 font-medium flex items-center gap-0.5 active:scale-95 transition-transform">
                                    <i class="fa-solid fa-repeat"></i> 替換食材
                                </button>
                            ` : '<span class="text-[9px] text-slate-400 block">基準減脂食材</span>'}
                        </div>
                        <span class="text-xs font-bold text-slate-900 tracking-tight bg-white px-2.5 py-1 rounded-lg shadow-sm border border-slate-100/60">${calculatedQty}g</span>
                    </div>
                `;
            }).join('');

            drawer.classList.remove('opacity-0', 'pointer-events-none');
            drawer.classList.add('opacity-100');
            drawer.firstElementChild.classList.remove('translate-y-full');
        }

        function triggerSubstitute(recipeId, ingIndex, originalName) {
            const subKey = `${recipeId}_${ingIndex}`;
            const pool = substitutionPool[originalName];
            if (!pool) return;

            const currentVal = state.substitutions[subKey] || originalName;
            let nextIndex = pool.indexOf(currentVal) + 1;

            if (currentVal === originalName) {
                state.substitutions[subKey] = pool[0];
            } else if (nextIndex >= pool.length) {
                delete state.substitutions[subKey];
            } else {
                state.substitutions[subKey] = pool[nextIndex];
            }

            const activeId = document.getElementById('recipeDrawer').dataset.activeId;
            const activeCal = document.getElementById('recipeDrawer').dataset.activeCal;
            openDrawer(activeId, parseInt(activeCal));
        }

        function closeDrawer() {
            const drawer = document.getElementById('recipeDrawer');
            drawer.classList.add('opacity-0', 'pointer-events-none');
            drawer.classList.remove('opacity-100');
            drawer.firstElementChild.classList.add('translate-y-full');
        }

        // 重新構建數據庫視圖，使其完整渲染 137 道菜式並支持流暢滾動
        function buildDatabaseView() {
            const container = document.getElementById('databaseContent');
            const elementsHtml = fullListReference.map(item => `
                <div class="p-2.5 bg-slate-50/70 rounded-xl border border-slate-100/80 flex items-center justify-between">
                    <span class="text-xs font-semibold text-slate-800">${item}</span>
                    <span class="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100/60 flex-shrink-0 ml-2">精準純克數</span>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="space-y-1.5 pr-1 max-h-full overflow-y-auto">
                    ${elementsHtml}
                </div>
            `;
        }

        function openDatabaseDrawer() {
            const dbDrawer = document.getElementById('databaseDrawer');
            dbDrawer.classList.remove('opacity-0', 'pointer-events-none');
            dbDrawer.classList.add('opacity-100');
            dbDrawer.firstElementChild.classList.remove('translate-y-full');
        }

        function closeDatabaseDrawer() {
            const dbDrawer = document.getElementById('databaseDrawer');
            dbDrawer.classList.add('opacity-0', 'pointer-events-none');
            dbDrawer.classList.remove('opacity-100');
            dbDrawer.firstElementChild.classList.add('translate-y-full');
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
